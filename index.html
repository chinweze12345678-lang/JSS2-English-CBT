<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSS1 English CBT</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <h1>JSS2 ENGLISH LANGUAGE CBT</h1>

    <div class="school-info">
    <h2>FESBEVERLY HILLS ACADEMY</h2>
    <h3>COMPUTER-BASED TEST (CBT)</h3>
</div>

<div class="exam-details">
    <p><strong>Subject:</strong> English Language</p>
    <p><strong>Class:</strong> JSS2</p>
    <p><strong>Duration:</strong> 40 Minutes</p>
    <p><strong>Total Questions:</strong> 50</p>
</div>
<p>Please enter your name before starting the examination.</p>
        <input
            type="text"
            id="studentName"
            placeholder="Enter Your Name">

        <input
            type="text"
            id="studentClass"
            placeholder="Enter Your Class">

        <button id="startBtn">
            Start Examination
        </button>

    </div>

    <div id="exam-screen" style="display:none;">

        <div class="top-bar">
            <h3 id="studentInfo"></h3>

            <div id="timer">
                40:00
            </div>
        </div>

        <h2 id="question-number"></h2>

        <h3 id="question"></h3>

        <div id="options"></div>

        <div class="buttons">

            <button id="prevBtn">
                Previous
            </button>

            <button id="nextBtn">
                Next
            </button>

        </div>

    </div>

</div>

<script src="js/questions.js"></script>
<script src="js/script.js"></script>

</body>
</html>
