<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FESBEVERLY HILLS ACADEMY CBT</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

    <!-- LOGIN PAGE -->
    <div id="start-screen">

        <h1>FESBEVERLY HILLS ACADEMY</h1>

        <h2>JSS2 ENGLISH LANGUAGE CBT</h2>

        <div class="exam-info">

            <p><strong>Duration:</strong> 40 Minutes</p>

            <p><strong>Total Questions:</strong> 50</p>

            <p>
                Enter your full name before starting the examination.
            </p>

        </div>

        <input
            type="text"
            id="studentName"
            placeholder="Enter Your Full Name">

        <button id="startBtn">
            START EXAMINATION
        </button>

    </div>

    <!-- EXAM PAGE -->

    <div id="exam-screen" style="display:none;">

        <div class="top-bar">

            <div id="studentInfo"></div>

            <div id="timer">
                40:00
            </div>

        </div>

        <div class="progress">

            <div id="progress-bar"></div>

        </div>

        <h3 id="question-number"></h3>

        <h2 id="question"></h2>

        <div id="options"></div>

        <div class="navigation">

            <button id="prevBtn">

                Previous

            </button>

            <button id="nextBtn">

                Next

            </button>

        </div>

        <div id="palette">

        </div>

        <button id="submitBtn">

            Submit Examination

        </button>

    </div>

</div>

<script src="js/questions.js"></script>

<script src="js/script.js"></script>

</body>
</html>
