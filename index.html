<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSS1 English CBT</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>JSS2 ENGLISH LANGUAGE CBT</h1>

    <div id="start-screen">

        <h2>Welcome</h2>

        <p>Please enter your details before starting the examination.</p>

        <input
            type="text"
            id="studentName"
            placeholder="Enter Your Name">

        <input
            type="text"
            id="studentClass"
            placeholder="Enter Your Class">

        <button id="startBtn">
            Start Examination
        </button>

    </div>

    <div id="exam-screen" style="display:none;">

        <div class="top-bar">
            <h3 id="studentInfo"></h3>

            <div id="timer">
                40:00
            </div>
        </div>

        <h2 id="question-number"></h2>

        <h3 id="question"></h3>

        <div id="options"></div>

        <div class="buttons">

            <button id="prevBtn">
                Previous
            </button>

            <button id="nextBtn">
                Next
            </button>

        </div>

    </div>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
